name: Build, Deploy, Test, and Teardown AKS

on:
  push:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    env:
      ACR_NAME: ${{ secrets.AZURE_CONTAINER_REGISTRY }}
      RESOURCE_GROUP: ${{ secrets.RESOURCE_GROUP }}
      AKS_NAME: ${{ secrets.CLUSTER_NAME }}
      LOCATION: ${{ secrets.AZURE_LOCATION }}
      IMAGE_NAME: aks-demo
      IMAGE_TAG: latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Azure Login (OIDC)
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    # -----------------------------
    # 0. Create/ensure Resource Group
    # -----------------------------
    - name: Ensure Resource Group exists
      run: |
        az group create \
          --name "$RESOURCE_GROUP" \
          --location "$LOCATION"

    # -----------------------------
    # 1. Deploy Infra via Bicep
    # -----------------------------
    - name: Deploy ACR + AKS via Bicep
      run: |
        az deployment group create \
          --resource-group "$RESOURCE_GROUP" \
          --name "aks-infra-deploy" \
          --template-file infra/main.bicep \
          --parameters acrName="$ACR_NAME" aksName="$AKS_NAME"

    # Give AKS permission to pull from ACR
    - name: Attach ACR to AKS
      run: |
        az aks update \
          --resource-group "$RESOURCE_GROUP" \
          --name "$AKS_NAME" \
          --attach-acr "$ACR_NAME"

    # -----------------------------
    # 2. Build & Push Docker Image
    # -----------------------------
    - name: Build and Push Image to ACR
      run: |
        az acr login --name "$ACR_NAME"
        IMAGE="$ACR_NAME.azurecr.io/$IMAGE_NAME:$IMAGE_TAG"
        docker build -t "$IMAGE" ./app
        docker push "$IMAGE"

    # -----------------------------
    # 3. Connect to AKS
    # -----------------------------
    - name: Set AKS context
      uses: azure/aks-set-context@v3
      with:
        resource-group: ${{ env.RESOURCE_GROUP }}
        cluster-name: ${{ env.AKS_NAME }}

    - name: Install Helm
      uses: azure/setup-helm@v3

    - name: Deploy with Helm
      run: |
        helm upgrade --install aks-demo ./helm/aks-demo \
          --set image.repository=${ACR_NAME}.azurecr.io/aks-demo \
          --set image.tag=${IMAGE_TAG}

    - name: Debug pods
      run: |
        kubectl get pods -o wide
        kubectl describe pods

    # -----------------------------
    # 4. Wait for External IP 
    # -----------------------------
    - name: Wait for deployment to be ready
      run: |
        kubectl rollout status deployment/aks-demo --timeout=300s

    - name: Get Service External IP
      id: get_ip
      run: |
        for i in {1..30}; do
          IP=$(kubectl get svc aks-demo -o jsonpath='{.status.loadBalancer.ingress[0].ip}' || true)
          if [ -n "$IP" ]; then
            echo "EXTERNAL_IP=$IP" >> $GITHUB_ENV
            echo "External IP: $IP"
            exit 0
          fi
          echo "Waiting for external IP..."
          sleep 10
        done
        echo "Failed to get external IP"
        exit 1

    # -----------------------------
    # 5. Smoke Test
    # -----------------------------
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    - name: Install Maven
      run: sudo apt-get update && sudo apt-get install -y maven

    - name: Run Concordion Acceptance Tests
      run: |
        cd acceptance-tests
        mvn -q -DexternalIp=$EXTERNAL_IP test || true

    - name: Upload Concordion Report
      uses: actions/upload-artifact@v4
      with:
        name: concordion-report
        path: acceptance-tests/target/concordion

    # -----------------------------
    # 6. Teardown (Closure)
    # -----------------------------
    - name: Teardown Resource Group
      if: always()
      run: |
        echo "Deleting resource group $RESOURCE_GROUP"
        az group delete \
          --name "$RESOURCE_GROUP" \
          --yes \
          --no-wait
